<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logix Chatbot Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .chat-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="chat-gradient text-gray-100 min-h-screen flex items-center justify-center p-4">

<div id="app" class="w-full max-w-2xl h-[80vh] flex flex-col bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 overflow-hidden">
    
    <header class="p-4 bg-gray-900 border-b border-gray-700 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white shadow-lg">L</div>
            <div>
                <h1 class="text-lg font-bold leading-tight">Logix AI</h1>
                <p class="text-xs text-green-400 flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse"></span> Online
                </p>
            </div>
        </div>
        <button @click="clearChat" class="text-xs text-gray-400 hover:text-white transition">Clear Chat</button>
    </header>

    <main class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar" id="chat-window">
        <div v-for="(msg, index) in messages" :key="index" 
             :class="['flex', msg.role === 'user' ? 'justify-end' : 'justify-start']">
            
            <div :class="[
                'max-w-[80%] px-4 py-2 rounded-2xl text-sm leading-relaxed shadow-sm',
                msg.role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-gray-700 text-gray-200 rounded-tl-none'
            ]">
                {{ msg.content }}
            </div>
        </div>

        <div v-if="isTyping" class="flex justify-start">
            <div class="bg-gray-700 px-4 py-3 rounded-2xl rounded-tl-none flex space-x-1">
                <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce [animation-delay:-.3s]"></div>
                <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce [animation-delay:-.5s]"></div>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-gray-900 border-t border-gray-700">
        <form @submit.prevent="sendMessage" class="flex space-x-2">
            <input 
                v-model="userInput"
                type="text" 
                placeholder="Type your logic query..." 
                class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-blue-500 transition text-sm"
                :disabled="isTyping"
            >
            <button 
                type="submit"
                :disabled="isTyping || !userInput.trim()"
                class="bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed px-5 py-2 rounded-xl transition font-medium text-sm"
            >
                Send
            </button>
        </form>
    </footer>
</div>

<script>
    const { createApp, ref, nextTick } = Vue;

    createApp({
        setup() {
            const userInput = ref('');
            const isTyping = ref(false);
            const messages = ref([
                { role: 'bot', content: 'Hello! I am Logix. How can I assist you with your logic or code today?' }
            ]);

            const scrollToBottom = async () => {
                await nextTick();
                const container = document.getElementById('chat-window');
                container.scrollTop = container.scrollHeight;
            };

            const sendMessage = async () => {
                const text = userInput.value.trim();
                if (!text) return;

                // Add User Message
                messages.value.push({ role: 'user', content: text });
                userInput.value = '';
                await scrollToBottom();

                // Trigger Bot Response
                isTyping.value = true;
                
                // Simulate network/logic delay
                setTimeout(() => {
                    const response = getBotResponse(text);
                    messages.value.push({ role: 'bot', content: response });
                    isTyping.value = false;
                    scrollToBottom();
                }, 1200);
            };

            const getBotResponse = (input) => {
                const lowerInput = input.toLowerCase();
                if (lowerInput.includes('hello') || lowerInput.includes('hi')) return "Greetings! Ready to process some logic.";
                if (lowerInput.includes('time')) return "The current system time is " + new Date().toLocaleTimeString();
                if (lowerInput.includes('help')) return "I can help with code snippets, logic gates, or troubleshooting.";
                return "Interesting request. As Logix, I'm processing: '" + input + "'. How should we proceed?";
            };

            const clearChat = () => {
                messages.value = [{ role: 'bot', content: 'History cleared. System reset.' }];
            };

            return { userInput, messages, isTyping, sendMessage, clearChat };
        }
    }).mount('#app');
</script>

</body>
</html>
