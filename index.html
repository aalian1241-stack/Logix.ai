<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logix Code Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1e1e1e; color: #d4d4d4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; }
        .activity-bar { width: 50px; background-color: #333333; }
        .sidebar { width: 250px; background-color: #252526; }
        .editor { background-color: #1e1e1e; }
        .status-bar { height: 25px; background-color: #007acc; }
        .line-numbers { color: #858585; text-align: right; padding-right: 15px; user-select: none; }
        .cursor-blink { border-left: 2px solid #fff; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { border-color: transparent; } }
        .terminal { background-color: #1e1e1e; border-top: 1px solid #333; height: 200px; }
        input { background: transparent; border: none; outline: none; color: #9cdcfe; width: 100%; font-family: monospace; }
    </style>
</head>
<body>

<div id="app" class="flex flex-col h-screen">
    
    <div class="flex flex-1 overflow-hidden">
        
        <div class="activity-bar flex flex-col items-center py-4 space-y-6 text-gray-400">
            <i class="fas fa-copy text-xl text-white"></i>
            <i class="fas fa-search text-xl hover:text-white cursor-pointer"></i>
            <i class="fas fa-code-branch text-xl hover:text-white cursor-pointer"></i>
            <i class="fas fa-th-large text-xl hover:text-white cursor-pointer"></i>
            <i class="fas fa-robot text-xl text-blue-400"></i>
        </div>

        <div class="sidebar border-r border-black p-4">
            <h2 class="text-xs font-bold uppercase mb-4 tracking-widest text-gray-500">Explorer</h2>
            <div class="space-y-2 text-sm">
                <div class="flex items-center text-blue-400"><i class="fas fa-chevron-down mr-2 text-[10px]"></i> LOGIX-PROJECT</div>
                <div class="ml-4 flex items-center hover:bg-gray-700 p-1 rounded cursor-pointer">
                    <i class="fab fa-html5 mr-2 text-orange-500"></i> index.html
                </div>
                <div class="ml-4 flex items-center hover:bg-gray-700 p-1 rounded cursor-pointer">
                    <i class="fab fa-js mr-2 text-yellow-400"></i> logix-core.ai
                </div>
            </div>
        </div>

        <div class="editor flex-1 flex flex-col">
            <div class="flex bg-[#2d2d2d] text-xs">
                <div class="bg-[#1e1e1e] px-4 py-2 border-t-2 border-blue-500 flex items-center">
                    <i class="fab fa-js mr-2 text-yellow-400"></i> logix-core.ai <i class="fas fa-times ml-3 opacity-50"></i>
                </div>
            </div>

            <div class="flex-1 p-4 font-mono text-sm overflow-y-auto flex">
                <div class="line-numbers text-right">
                    <div v-for="n in 20" :key="n">{{ n }}</div>
                </div>
                <div class="flex-1 text-blue-300">
                    <div v-for="(line, i) in chatLog" :key="i">
                        <span class="text-gray-500">// Logix: {{ line.role }}</span><br>
                        <span :class="line.role === 'ai' ? 'text-green-400' : 'text-blue-200'">{{ line.text }}</span>
                    </div>
                    <div class="mt-2 flex">
                        <span class="text-yellow-400 mr-2">> </span>
                        <input v-model="userInput" @keyup.enter="submitQuery" placeholder="Type command..." autofocus>
                        <span class="cursor-blink"></span>
                    </div>
                </div>
            </div>

            <div class="terminal p-4 font-mono text-xs overflow-y-auto">
                <div class="flex space-x-4 mb-2 border-b border-gray-700 pb-1">
                    <span class="border-b border-white pb-1">TERMINAL</span>
                    <span class="text-gray-500">OUTPUT</span>
                    <span class="text-gray-500">DEBUG CONSOLE</span>
                </div>
                <div class="text-green-500">[LOGIX] Coastal Logic Engine initialized...</div>
                <div class="text-gray-400">[SYS] {{ statusMessage }}</div>
            </div>
        </div>
    </div>

    <div class="status-bar flex justify-between items-center px-3 text-[11px] text-white">
        <div class="flex items-center space-x-4">
            <div class="hover:bg-white/20 px-1 cursor-pointer"><i class="fas fa-code-branch mr-1"></i> main*</div>
            <div class="hover:bg-white/20 px-1 cursor-pointer"><i class="fas fa-sync mr-1"></i> Refresh</div>
        </div>
        <div class="flex items-center space-x-4">
            <span>UTF-8</span>
            <span>HTML/Logix</span>
            <i class="fas fa-bell"></i>
        </div>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            const userInput = ref('');
            const statusMessage = ref('Waiting for input...');
            const chatLog = ref([
                { role: 'ai', text: 'System ready. Enter "help" to see coastal commands.' }
            ]);

            // HUGE "COASTAL" DATA SET
            const database = {
                "help": "Available: build, logic, weather, clear, system-info, about.",
                "build": "Initializing Web App Builder... HTML Template created in memory.",
                "logic": "Coastal Logic: (Input A XOR Input B) results in High signal if states differ.",
                "weather": "Coastal Data: 22°C, Sunny, Wind 5km/h Northwest.",
                "system-info": "Version: 3.5.0-Flash | Memory: Stable | CPU: Optimized.",
                "about": "I am Logix, a VS Code inspired AI designed for local web app simulation."
            };

            const submitQuery = () => {
                const cmd = userInput.value.trim().toLowerCase();
                if (!cmd) return;

                // Add User message
                chatLog.value.push({ role: 'user', text: userInput.value });
                statusMessage.value = `Processing "${cmd}"...`;

                // Logic Processing
                setTimeout(() => {
                    let response = database[cmd] || `Error: Command "${cmd}" not found in Coastal Database.`;
                    
                    if(cmd.includes("clear")) {
                        chatLog.value = [{ role: 'ai', text: 'Console cleared.' }];
                    } else {
                        chatLog.value.push({ role: 'ai', text: response });
                    }
                    
                    statusMessage.value = "Ready";
                    userInput.value = '';
                }, 400);
            };

            return { userInput, chatLog, statusMessage, submitQuery };
        }
    }).mount('#app');
</script>

</body>
</html>
