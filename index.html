<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logix.ai Pro | Multi-Functional Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --bot-bg: #ffffff;
            --user-bg: #6366f1;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* Strong Design Container */
        #chat-container {
            width: 420px;
            height: 650px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #header {
            background: var(--primary);
            color: white;
            padding: 25px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 1.5px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
        }

        /* Message Bubbles */
        .msg {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14.5px;
            line-height: 1.6;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--user-bg);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--bot-bg);
            color: #1e293b;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Input Area */
        #input-area {
            padding: 25px;
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        input {
            flex: 1;
            padding: 14px 22px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 30px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.15);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:hover {
            transform: scale(1.1);
            background: var(--secondary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Logix.ai Intelligence</div>
    <div id="chat-window"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your question..." autocomplete="off">
        <button id="send-btn">➔</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // 1. Voice Introduction Logic
    function speak(text) {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        // Optional: Find a specific voice
        const voices = synth.getVoices();
        utterance.voice = voices.find(v => v.lang.includes('en')) || voices[0];
        synth.speak(utterance);
    }

    // Initial Greeting
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            const intro = "Welcome to Logix AI. I am initialized and ready for your questions.";
            addMessage(intro, 'bot-msg');
            // Browser policy: Voice often needs a click to start, so we call it on the first bot reply
        }, 800);
    });

    // 2. Main Chat Processing
    function processChat() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        userInput.value = "";

        // Artificial "thinking" delay
        setTimeout(() => {
            const response = getTrainingLogic(text);
            addMessage(response, 'bot-msg');
            speak(response); // Bot speaks the response
        }, 700);
    }

    // 3. The Q&A Training Logic (Knowledge Base)
    function getTrainingLogic(input) {
        const msg = input.toLowerCase();

        if (msg.includes("hello") || msg.includes("hi")) {
            return "Greetings! I am your multi-functional assistant. How can I help you today?";
        }
        if (msg.includes("who are you")) {
            return "I am a Logix.ai powered bot, designed to handle multiple functions in a single interface.";
        }
        if (msg.includes("what can you do")) {
            return "I can answer questions, provide real-time feedback, and speak my responses out loud!";
        }
        if (msg.includes("time")) {
            return "The current time is " + new Date().toLocaleTimeString() + ".";
        }
        if (msg.includes("weather")) {
            return "I don't have a barometer, but the forecast for your code looks bright!";
        }
        
        // Default Fallback
        return "That is an interesting query. I am still being trained on that specific topic. Try asking about my functions!";
    }

    // Helper: Add Message to UI
    function addMessage(text, className) {
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Event Listeners
    sendBtn.addEventListener('click', processChat);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') processChat();
    });
</script>

</body>
</html>
