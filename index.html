<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpensePro | Final Intelligence Suite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #4f46e5; --success: #10b981; --danger: #ef4444;
            --bg: #f8fafc; --sidebar: #ffffff; --border: #e2e8f0;
            --text-main: #1e293b; --text-sub: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 30px 20px; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; color: var(--text-sub); cursor: pointer; border: none; background: none; width: 100%; font-size: 15px; font-weight: 600; transition: 0.3s; margin-bottom: 5px; text-align: left;}
        .nav-link.active { background: var(--primary); color: white; }

        /* Content Area */
        .content-area { flex: 1; padding: 40px; overflow-y: auto; }
        .view { display: none; max-width: 1000px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & Stats */
        .card { background: white; padding: 24px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 25px; position: relative; }
        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-value { font-size: 26px; font-weight: 700; margin-top: 8px; }

        /* Inputs */
        .input-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 12px; margin-top: 15px; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-size: 12px; color: var(--text-sub); border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .action-btns { display: flex; gap: 15px; color: var(--text-sub); cursor: pointer; }
        .action-btns i:hover { color: var(--primary); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo"><i class="fa-solid fa-vault"></i> ExpensePro</div>
        <button class="nav-link active" onclick="switchTab('dashboard', this)"><i class="fa-solid fa-gauge-high"></i> Dashboard</button>
        <button class="nav-link" onclick="switchTab('savings', this)"><i class="fa-solid fa-piggy-bank"></i> Savings</button>
        <button class="nav-link" onclick="switchTab('settings', this)"><i class="fa-solid fa-user-gear"></i> Settings</button>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button class="nav-link" onclick="exportPDF()"><i class="fa-solid fa-file-pdf"></i> Export PDF</button>
            <button class="nav-link" onclick="exportData()"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
        </div>
    </nav>

    <div class="content-area">
        <section id="dashboard" class="view active">
            <header>
                <h1>Overview</h1>
                <p id="date-display" style="color: var(--text-sub); margin-bottom: 25px;"></p>
            </header>

            <div class="grid-stats">
                <div class="card">
                    <p style="font-size: 13px; font-weight: 600; color: var(--text-sub);">TOTAL SPENT</p>
                    <div class="stat-value" id="total-exp-val">Rs. 0</div>
                </div>
                <div class="card">
                    <p style="font-size: 13px; font-weight: 600; color: var(--text-sub);">MONTHLY BUDGET</p>
                    <div class="stat-value" id="budget-val">Rs. 0</div>
                </div>
                <div class="card">
                    <p style="font-size: 13px; font-weight: 600; color: var(--text-sub);">SAVINGS</p>
                    <div class="stat-value" id="savings-val">Rs. 0</div>
                </div>
            </div>

            <div class="card">
                <h3 id="form-mode">Add New Expense</h3>
                <div class="input-row">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="exp-desc" placeholder="What did you buy?">
                    <select id="exp-cat">
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Bills">Bills</option>
                        <option value="Health">Health</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="number" id="exp-amt" placeholder="Amount">
                    <button class="btn-add" id="submit-btn" onclick="processExpense()">Add Entry</button>
                </div>
            </div>

            <div class="card">
                <table id="exp-table">
                    <thead>
                        <tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="exp-body"></tbody>
                </table>
            </div>
        </section>

        <section id="savings" class="view"><h1>Savings Goal</h1><div class="card" id="savings-content">Goal tracker content here...</div></section>
        <section id="settings" class="view"><h1>Settings</h1><div class="card" id="settings-content">Profile settings here...</div></section>
    </div>

    <script>
        let appState = JSON.parse(localStorage.getItem('EXP_PRO_FINAL')) || {
            expenses: [],
            savings: 0,
            config: { name: 'User', budget: 50000, goal: 'General', target: 100000 }
        };

        function switchTab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // --- EXPENSE PROCESS (ADD & EDIT) ---
        function processExpense() {
            const id = document.getElementById('edit-id').value;
            const desc = document.getElementById('exp-desc').value;
            const cat = document.getElementById('exp-cat').value;
            const amt = parseFloat(document.getElementById('exp-amt').value);

            if(!desc || isNaN(amt)) return alert("Invalid details");

            if(id) {
                // Edit existing
                const index = appState.expenses.findIndex(e => e.id == id);
                appState.expenses[index] = { ...appState.expenses[index], desc, cat, amt };
                document.getElementById('form-mode').innerText = "Add New Expense";
                document.getElementById('submit-btn').innerText = "Add Entry";
                document.getElementById('edit-id').value = "";
            } else {
                // Add new
                appState.expenses.unshift({ id: Date.now(), date: new Date().toLocaleDateString('en-GB'), desc, cat, amt });
            }
            syncAndRender();
            clearInputs();
        }

        function editExpense(id) {
            const exp = appState.expenses.find(e => e.id == id);
            document.getElementById('edit-id').value = exp.id;
            document.getElementById('exp-desc').value = exp.desc;
            document.getElementById('exp-cat').value = exp.cat;
            document.getElementById('exp-amt').value = exp.amt;
            document.getElementById('form-mode').innerText = "Edit Expense";
            document.getElementById('submit-btn').innerText = "Update Entry";
            window.scrollTo(0,0);
        }

        function deleteExpense(id) {
            if(confirm("Delete this entry?")) {
                appState.expenses = appState.expenses.filter(e => e.id !== id);
                syncAndRender();
            }
        }

        function clearInputs() {
            document.getElementById('exp-desc').value = "";
            document.getElementById('exp-amt').value = "";
        }

        function syncAndRender() {
            localStorage.setItem('EXP_PRO_FINAL', JSON.stringify(appState));
            renderTable();
        }

        function renderTable() {
            let total = 0;
            const body = document.getElementById('exp-body');
            body.innerHTML = '';
            appState.expenses.forEach(e => {
                total += e.amt;
                body.innerHTML += `
                    <tr>
                        <td>${e.date}</td>
                        <td style="font-weight:600">${e.desc}</td>
                        <td>${e.cat}</td>
                        <td style="font-weight:700">Rs. ${e.amt.toLocaleString()}</td>
                        <td class="action-btns">
                            <i class="fa-solid fa-pen-to-square" onclick="editExpense(${e.id})"></i>
                            <i class="fa-solid fa-trash" onclick="deleteExpense(${e.id})"></i>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('total-exp-val').innerText = "Rs. " + total.toLocaleString();
            document.getElementById('budget-val').innerText = "Rs. " + appState.config.budget.toLocaleString();
            document.getElementById('savings-val').innerText = "Rs. " + appState.savings.toLocaleString();
        }

        // --- PDF EXPORT FUNCTION ---
        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(20);
            doc.setTextColor(79, 70, 229);
            doc.text("ExpensePro Financial Report", 14, 20);
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text(`Generated for: ${appState.config.name} | Date: ${new Date().toDateString()}`, 14, 28);

            const tableData = appState.expenses.map(e => [e.date, e.desc, e.cat, `Rs. ${e.amt}`]);
            doc.autoTable({
                startY: 35,
                head: [['Date', 'Description', 'Category', 'Amount']],
                body: tableData,
                theme: 'grid',
                headStyles: { fillStyle: [79, 70, 229] }
            });

            doc.save("Expense_Report.pdf");
        }

        renderTable();
        document.getElementById('date-display').innerText = new Date().toDateString();
    </script>
</body>
</html>
