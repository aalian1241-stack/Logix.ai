<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logix Ultra | Gemini Hybrid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6; /* Gemini Purple */
            --accent: #10b981;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(at top left, #1e1b4b, #030712);
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; color: white; overflow: hidden;
        }

        #app-container {
            width: 95%; max-width: 1100px; height: 90vh;
            display: grid; grid-template-columns: 300px 1fr; gap: 20px;
        }

        /* Sidebar / Control Panel */
        #control-panel {
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            padding: 25px; display: flex; flex-direction: column; gap: 20px;
        }

        .setting-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .setting-box label { font-size: 11px; text-transform: uppercase; color: var(--primary); font-weight: bold; display: block; margin-bottom: 8px; }
        
        input[type="password"] {
            width: 100%; background: #000; border: 1px solid #333; color: #fff;
            padding: 8px; border-radius: 8px; font-size: 12px;
        }

        /* Chat Area */
        #chat-container {
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }

        #chat-window { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { padding: 14px 18px; border-radius: 18px; font-size: 14px; line-height: 1.6; max-width: 80%; position: relative; }
        .user-msg { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #fff; color: #000; border-bottom-left-radius: 2px; }
        
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; position: absolute; top: -15px; left: 5px; background: rgba(255,255,255,0.1); color: #fff; }

        #input-area { padding: 20px; background: rgba(0,0,0,0.4); display: flex; gap: 10px; }
        #user-input { flex: 1; background: transparent; border: 1px solid #333; padding: 12px 20px; border-radius: 30px; color: white; outline: none; }
        #send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; }

        @media (max-width: 800px) {
            #app-container { grid-template-columns: 1fr; }
            #control-panel { display: none; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="control-panel">
        <h2 style="margin:0; font-size:18px;">Memory Engine</h2>
        
        <div class="setting-box">
            <label>Gemini API Key</label>
            <input type="password" id="api-key" placeholder="Paste Key Here...">
            <p style="font-size:10px; color:#666; margin-top:5px;">If empty, bot uses Local Training.</p>
        </div>

        <div class="setting-box">
            <label>Permanent Stats</label>
            <div style="font-size:13px;">Knowledge Units: <span id="local-count" style="color:var(--accent)">0</span></div>
            <div style="font-size:13px; margin-top:5px;">AI Mode: <span id="ai-status" style="color:gray">Offline</span></div>
        </div>

        <button onclick="clearMemory()" style="background:rgba(255,0,0,0.1); color:#ff4444; border:1px solid #ff4444; padding:10px; border-radius:10px; cursor:pointer; margin-top:auto;">Wipe Local Memory</button>
    </div>

    <div id="chat-container">
        <div id="chat-window"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type a question or teach me something...">
            <button id="send-btn" onclick="processChat()">➔</button>
        </div>
    </div>
</div>

<script>
    // 1. Permanent Memory Setup
    let permanentMemory = JSON.parse(localStorage.getItem('gemini_local_mem')) || {};
    let isLearning = false;
    let lastQuery = "";

    function updateStats() {
        document.getElementById('local-count').innerText = Object.keys(permanentMemory).length;
        const key = document.getElementById('api-key').value;
        document.getElementById('ai-status').innerText = key ? "Gemini Active" : "Local Mode";
        document.getElementById('ai-status').style.color = key ? "#10b981" : "gray";
    }

    // 2. The Logic: Manual vs Gemini
    async function getAIResponse(input) {
        const apiKey = document.getElementById('api-key').value;
        const query = input.toLowerCase();

        // Check Local Permanent Memory first
        if (permanentMemory[query]) {
            return { text: permanentMemory[query], source: "Local Memory" };
        }

        // If API Key exists, try to call Gemini
        if (apiKey) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                // AUTO-TRAIN: Save Gemini's answer to permanent memory
                saveToMemory(query, aiText);
                return { text: aiText, source: "Gemini AI (Auto-Learned)" };
            } catch (err) {
                return { text: "API Error. Check your key or connection.", source: "System" };
            }
        }

        // Fallback to Learning Mode
        isLearning = true;
        lastQuery = query;
        return { text: "I don't know that yet. Please type the correct answer to train my permanent memory.", source: "System" };
    }

    function saveToMemory(q, a) {
        permanentMemory[q.toLowerCase()] = a;
        localStorage.setItem('gemini_local_mem', JSON.stringify(permanentMemory));
        updateStats();
    }

    // 3. UI Handling
    async function processChat() {
        const inputField = document.getElementById('user-input');
        const val = inputField.value.trim();
        if (!val) return;

        addMessage(val, 'user-msg');
        inputField.value = '';

        if (isLearning) {
            saveToMemory(lastQuery, val);
            isLearning = false;
            addMessage("Training Complete. I will remember this forever.", 'bot-msg', "System");
            return;
        }

        const response = await getAIResponse(val);
        addMessage(response.text, 'bot-msg', response.source);
    }

    function addMessage(text, className, source = "") {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        if (source) div.innerHTML = `<span class="badge">${source}</span>${text}`;
        else div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function clearMemory() {
        if(confirm("Wipe all permanent training?")) {
            localStorage.removeItem('gemini_local_mem');
            location.reload();
        }
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') processChat(); });
    setInterval(updateStats, 2000); // Keep status updated

    window.onload = () => {
        updateStats();
        addMessage("Logix Engine Ready. Enter a Gemini API Key for AI mode, or type to train me manually.", "bot-msg", "System");
    };
</script>

</body>
</html>
