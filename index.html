<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logix.ai | Self-Learning Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #10b981; --bg: #0f172a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; font-family: 'Inter', sans-serif; color: white; }
        #chat-container { width: 450px; height: 700px; background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; display: flex; flex-direction: column; border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        #header { background: var(--primary); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        .user-msg { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bot-msg { align-self: flex-start; background: white; color: #1e293b; border-bottom-left-radius: 4px; }
        .system-msg { align-self: center; background: rgba(255,255,255,0.1); color: #aaa; font-size: 12px; border-radius: 10px; padding: 5px 15px; }
        #input-area { padding: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.2); }
        input { flex: 1; padding: 14px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; outline: none; }
        button { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; transition: 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <h3>Logix Trainer</h3>
        <button onclick="location.reload()" style="background:none; font-size:12px; width:auto; color:white;">Reset Memory</button>
    </div>
    <div id="chat-window"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type something..." autocomplete="off">
        <button onclick="processChat()">➔</button>
    </div>
</div>

<script>
    // 1. Memory and Training State
    let learnedMemory = {}; // Stores new Q&A
    let isLearning = false; // Flag to check if we are in training mode
    let lastUnknownQuestion = ""; // Holds the question we are training

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(utterance);
    }

    function addMessage(text, className) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function processChat() {
        const inputField = document.getElementById('user-input');
        const text = inputField.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        inputField.value = '';

        setTimeout(() => {
            handleLogic(text);
        }, 600);
    }

    function handleLogic(userInput) {
        // IF BOT IS WAITING FOR A TEACHER'S ANSWER
        if (isLearning) {
            validateAndLearn(userInput);
            return;
        }

        const query = userInput.toLowerCase();

        // Check Hardcoded Logic
        if (query.includes("hi") || query.includes("hello")) {
            respond("Hello! I am ready to learn or chat.");
            return;
        }

        // Check Learned Memory
        if (learnedMemory[query]) {
            respond(learnedMemory[query]);
            return;
        }

        // UNKNOWN QUESTION - Start Training Feature
        lastUnknownQuestion = query;
        isLearning = true;
        respond("I don't know the answer to that yet. Can you teach me? Please type the correct answer below.");
        addMessage("SYSTEM: Learning Mode Active", "system-msg");
    }

    // THE FILTER & ACCEPTANCE LOGIC
    function validateAndLearn(answer) {
        // Filter Check: Is the answer too short or just nonsense?
        if (answer.length < 3) {
            respond("That answer is too short to be accepted. Please give me a better explanation.");
            return;
        }

        // Accept the answer
        learnedMemory[lastUnknownQuestion] = answer;
        isLearning = false;
        respond("Thank you! I have accepted that answer and saved it to my memory. Try asking the question again!");
        addMessage("SYSTEM: Knowledge Updated", "system-msg");
        console.log("Current Memory:", learnedMemory);
    }

    function respond(text) {
        addMessage(text, 'bot-msg');
        speak(text);
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') processChat();
    });

    window.onload = () => addMessage("Logix AI Online. Ask me anything to start training!", 'bot-msg');
</script>

</body>
</html>
