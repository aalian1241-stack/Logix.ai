<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logix AI | Coastal Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .message-in { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-200 flex items-center justify-center min-h-screen p-4">

<div id="app" class="w-full max-w-4xl h-[90vh] flex flex-col glass border border-slate-800 rounded-3xl shadow-2xl overflow-hidden">
    
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/40">
        <div class="flex items-center space-x-4">
            <div class="w-3 h-3 bg-cyan-500 rounded-full animate-pulse"></div>
            <h1 class="text-xl font-black tracking-widest text-cyan-500">LOGIX COASTAL v4</h1>
        </div>
        <div class="text-xs font-mono text-slate-500 uppercase tracking-widest">Memory Nodes: {{ chatHistory.length }}</div>
    </nav>

    <main class="flex-1 overflow-y-auto p-6 space-y-6" id="chat-container">
        <div v-for="(msg, i) in chatHistory" :key="i" 
             :class="['flex', msg.role === 'user' ? 'justify-end' : 'justify-start']">
            
            <div :class="[
                'max-w-[85%] p-4 rounded-2xl message-in shadow-lg text-sm transition-all',
                msg.role === 'user' ? 'bg-cyan-600 text-white rounded-br-none' : 'bg-slate-800 border border-slate-700 rounded-tl-none text-slate-200'
            ]">
                <p class="whitespace-pre-line">{{ msg.content }}</p>
            </div>
        </div>

        <div v-if="loading" class="flex justify-start">
            <div class="bg-slate-800 p-4 rounded-2xl rounded-tl-none border border-slate-700 flex space-x-2">
                <div class="w-2 h-2 bg-cyan-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                <div class="w-2 h-2 bg-cyan-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                <div class="w-2 h-2 bg-cyan-500 rounded-full animate-bounce"></div>
            </div>
        </div>
    </main>

    <footer class="p-6 bg-slate-900/60 border-t border-slate-800">
        <div class="relative max-w-3xl mx-auto">
            <input 
                v-model="userInput" 
                @keyup.enter="processInput"
                type="text" 
                placeholder="Ask about logic, tech, or weather..." 
                class="w-full bg-slate-950 border border-slate-700 rounded-2xl py-4 pl-6 pr-20 focus:outline-none focus:border-cyan-500 transition-all text-slate-200"
            >
            <button 
                @click="processInput"
                class="absolute right-2 top-2 bottom-2 px-6 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-bold text-xs uppercase tracking-widest transition-all active:scale-95"
            >
                Send
            </button>
        </div>
    </footer>
</div>

<script>
const { createApp, ref, nextTick } = Vue;

createApp({
    setup() {
        const userInput = ref('');
        const loading = ref(false);
        const chatHistory = ref([
            { role: 'bot', content: "Logix Coastal Online. My database is loaded with answers. Ask me anything." }
        ]);

        // "COASTAL" KNOWLEDGE BASE (The Brain)
        const knowledgeBase = {
            greetings: ["Hello! How can I help?", "Greetings, user.", "System online. Ready for input."],
            logic: {
                gates: "Logic gates are the building blocks of digital circuits: AND, OR, NOT, NAND, XOR.",
                boolean: "Boolean logic uses True/False or 1/0 values to determine outcomes."
            },
            tech: {
                ai: "Artificial Intelligence is the simulation of human intelligence by machines.",
                web: "Modern web apps are built using HTML, CSS, and JavaScript with reactive frameworks.",
                database: "Databases like SQL and NoSQL store information in tables or documents."
            },
            creative: {
                coding: "Coding is like poetry; every character matters and has a specific purpose.",
                future: "The future of technology is focused on automation and seamless AI integration."
            }
        };

        const scroll = async () => {
            await nextTick();
            const el = document.getElementById('chat-container');
            el.scrollTop = el.scrollHeight;
        };

        const processInput = () => {
            const text = userInput.value.trim().toLowerCase();
            if (!text) return;

            chatHistory.value.push({ role: 'user', content: userInput.value });
            userInput.value = '';
            loading.value = true;
            scroll();

            // Simulate "Coastal" thinking (searching many answers)
            setTimeout(() => {
                let reply = "I'm not sure about that specific query, but I can talk about logic, tech, or basics.";

                // Logic Search
                if (text.includes("hello") || text.includes("hi")) reply = knowledgeBase.greetings[Math.floor(Math.random() * 3)];
                else if (text.includes("logic")) reply = knowledgeBase.logic.gates;
                else if (text.includes("boolean")) reply = knowledgeBase.logic.boolean;
                else if (text.includes("tech") || text.includes("ai")) reply = knowledgeBase.tech.ai;
                else if (text.includes("web") || text.includes("build")) reply = knowledgeBase.tech.web;
                else if (text.includes("code")) reply = knowledgeBase.creative.coding;
                else if (text.includes("future")) reply = knowledgeBase.creative.future;
                else if (text.includes("name")) reply = "You can call me Logix, your coastal AI companion.";

                chatHistory.value.push({ role: 'bot', content: reply });
                loading.value = false;
                scroll();
            }, 800);
        };

        return { userInput, chatHistory, loading, processInput };
    }
}).mount('#app');
</script>

</body>
</html>
