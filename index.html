<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Talking AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .container { text-align: center; background: #1e1e1e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 500px; }
        #status { color: #00ffcc; margin-bottom: 1rem; font-weight: bold; }
        #transcript { font-style: italic; color: #bbb; margin: 1rem 0; min-height: 1.2em; }
        #ai-response { font-size: 1.2rem; margin: 1.5rem 0; color: #ffffff; }
        button { background: #00ffcc; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #00d4aa; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <div id="status">Ready to talk</div>
    <div id="transcript">"Your speech will appear here..."</div>
    <div id="ai-response">I'm listening. Click the button and say hello!</div>
    <button id="start-btn">Push to Talk</button>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const transcriptDisplay = document.getElementById('transcript');
    const aiResponseDisplay = document.getElementById('ai-response');
    const statusDisplay = document.getElementById('status');

    // Initialize Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;

    // Initialize Speech Synthesis (The Voice)
    const synth = window.speechSynthesis;

    startBtn.addEventListener('click', () => {
        recognition.start();
        statusDisplay.innerText = "Listening...";
    });

    recognition.onresult = (event) => {
        const userText = event.results[0][0].transcript;
        transcriptDisplay.innerText = `You said: "${userText}"`;
        processResponse(userText);
    };

    recognition.onspeechend = () => {
        recognition.stop();
        statusDisplay.innerText = "Processing...";
    };

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        
        // Pick a more "human" sounding voice if available
        const voices = synth.getVoices();
        utterance.voice = voices.find(v => v.name.includes('Google') || v.name.includes('Female')) || voices[0];
        
        synth.speak(utterance);
        aiResponseDisplay.innerText = text;
        statusDisplay.innerText = "Ready to talk";
    }

    function processResponse(input) {
        const text = input.toLowerCase();
        
        // Simple logic for "human-like" interaction
        if (text.includes("hello") || text.includes("hi")) {
            speak("Hello there! It is wonderful to hear your voice. How are you doing today?");
        } 
        else if (text.includes("how are you")) {
            speak("I'm doing great, thank you for asking. I'm just a bundle of code, but I'm feeling very efficient!");
        }
        else if (text.includes("time")) {
            speak("The current time is " + new Date().toLocaleTimeString());
        }
        else if (text.includes("your name")) {
            speak("You can call me your HTML assistant. I don't have a fancy name yet.");
        }
        else if (text.includes("joke")) {
            speak("Why did the web developer walk out of a restaurant? Because of the table layout.");
        }
        else if (text.includes("goodbye") || text.includes("bye")) {
            speak("Goodbye! Have a fantastic day.");
        }
        else {
            speak("That is interesting! Tell me more about that, or ask me something else.");
        }
    }
</script>

</body>
</html>
