<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logix.ai Multi-Bot</title>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 400px; background: white; border-radius: 10px; shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #ddd; }
        #chat-window { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 8px 12px; border-radius: 15px; max-width: 80%; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .bot { align-self: flex-start; background: #e9e9eb; color: #333; }
        #input-area { display: flex; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: none; outline: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-window">
        <div class="message bot">Hello! I am your Logix-powered assistant. How can I help you today?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask me anything...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        const message = inputField.value.trim();

        if (!message) return;

        // Display User Message
        appendMessage(message, 'user');
        inputField.value = '';

        // Placeholder for Logix.ai API Call
        // In a real scenario, you would use fetch() to send 'message' to your bot's endpoint
        const response = await getBotResponse(message);
        appendMessage(response, 'bot');
    }

    function appendMessage(text, sender) {
        const chatWindow = document.getElementById('chat-window');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function getBotResponse(input) {
        // Simple Logic Simulation
        // You would replace this with your Logix.ai API integration
        if (input.toLowerCase().includes("hello")) return "Hi there! I'm ready to answer your questions.";
        if (input.toLowerCase().includes("help")) return "I can help with coding, math, or general info.";
        return "That's interesting! Tell me more about that.";
    }
</script>

</body>
</html>
